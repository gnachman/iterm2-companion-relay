# Cloudflare-origin vhost: CF -> this box :8443 -> relay on localhost:8788.
# Firewall :8443 to Cloudflare IP ranges only (see notes); :443 stays public.
Listen 8443

<VirtualHost *:8443>
	ServerName relay.iterm2.com

	SSLEngine on
	SSLCertificateFile    /etc/ssl/cloudflare/companion-relay.pem
	SSLCertificateKeyFile /etc/ssl/cloudflare/companion-relay.key

	# Zero-PII: errors only, no access log (would capture IPs).
	ErrorLog ${APACHE_LOG_DIR}/companion-relay-cf-error.log

	# Behind Cloudflare: PASS CF-Connecting-IP through (do NOT strip it) — the
	# relay trusts it (RELAY_TRUST_CLOUDFLARE=true) and the :8443 firewall admits
	# only Cloudflare, so it cannot be forged.
	ProxyPreserveHost Off
	ProxyPass        "/" "http://127.0.0.1:8788/" upgrade=websocket
	ProxyPassReverse "/" "http://127.0.0.1:8788/"
</VirtualHost>
