# Apache reverse-proxy vhost for the iTerm2 Companion relay.
#
# Use this instead of the Caddyfile when the host already runs Apache (it
# coexists with other name-based vhosts). The Node process listens on
# localhost:8787; Apache terminates TLS and proxies HTTP + WebSocket to it.
#
# Install:
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers
#   sudo cp ops/apache-companion-relay.conf /etc/apache2/sites-available/companion-relay.conf
#   sudo a2ensite companion-relay
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   # then, once DNS for the hostname points at this box:
#   sudo certbot --apache -d relay.iterm2.com
#   # certbot copies these directives into a :443 vhost, adds the cert, and
#   # redirects :80 -> :443.

<VirtualHost *:80>
	ServerName relay.iterm2.com

	# Privacy: the relay retains no logs and never records client IPs. Do NOT
	# write an access log for this vhost — it would capture IPs. Errors only.
	ErrorLog ${APACHE_LOG_DIR}/companion-relay-error.log
	# (no CustomLog on purpose)

	# Defense in depth: this origin is not behind Cloudflare, so a client must
	# never be able to forge CF-Connecting-IP. Strip it; the relay keys per-IP
	# limits on X-Forwarded-For, which mod_proxy sets to the real TCP peer (the
	# relay reads the rightmost hop, so a client-prepended XFF is ignored).
	RequestHeader unset CF-Connecting-IP

	# Proxy HTTP and WebSocket (both on path "/") to the Node process.
	# upgrade=websocket (Apache 2.4.47+) sends Upgrade:websocket requests through
	# a WS tunnel and everything else as plain HTTP.
	ProxyPreserveHost Off
	ProxyPass        "/" "http://127.0.0.1:8787/" upgrade=websocket
	ProxyPassReverse "/" "http://127.0.0.1:8787/"
</VirtualHost>
